<!DOCTYPE html>
<html lang="de">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">

   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
   <link rel="stylesheet" href="assets/css/styles.css">

   <title>Familienstammbaum</title>
</head>
<body>
   <main class="dashboard" id="app-dashboard">
      <div class="dashboard__container">
         <header class="dashboard__header">
            <h1 class="dashboard__title">Familienstammbaum</h1>
            <button type="button" class="dashboard__logout" id="logout-btn">
               <i class="ri-logout-box-r-line"></i>
               Abmelden
            </button>
         </header>

         <section class="dashboard__welcome">
            <h2 class="dashboard__greeting" id="dashboard-greeting"></h2>
            <p class="dashboard__message">Willkommen im Familienstammbaum.</p>
         </section>

         <!-- Neues Informations-Panel & Hauptaktion -->
         <div class="dashboard__content" id="dashboard-content">
            <div class="dashboard__profile-panel">
               <div class="profile-panel__header">
                  <i class="ri-user-heart-line profile-panel__avatar-icon"></i>
                  <h3 class="profile-panel__title">Persönliche Daten</h3>
               </div>
               
               <div class="profile-panel__info">
                  <div class="profile-panel__item">
                     <span class="profile-panel__label">Name</span>
                     <span class="profile-panel__value" id="profile-name">-</span>
                  </div>
                  <div class="profile-panel__item">
                     <span class="profile-panel__label">Geboren am</span>
                     <span class="profile-panel__value" id="profile-birthdate">-</span>
                  </div>
                  <div class="profile-panel__item">
                     <span class="profile-panel__label">Kinder</span>
                     <span class="profile-panel__value" id="profile-children">-</span>
                  </div>
                  <div class="profile-panel__item">
                     <span class="profile-panel__label">Verheiratet</span>
                     <span class="profile-panel__value" id="profile-married">-</span>
                  </div>
               </div>
            </div>

            <button type="button" class="dashboard__cta-btn" id="open-tree-btn">
               <i class="ri-node-tree"></i>
               <span>Stammbaum aufrufen</span>
            </button>
         </div>
      </div>
   </main>

   <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
   <script src="assets/js/data.js"></script>
   <script src="assets/js/auth.js"></script>
   <script src="assets/js/dashboard.js"></script>
</body>
</html>
